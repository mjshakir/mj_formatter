[policy]
name = "naming_conventions"
enabled = true
type = "python"
touch_contract = "code_only" # any | code_only | preprocessor_only | whitespace_only

# standards: mj (default), google, llvm, qt
standard = "mj"
# naming_conventions is clang-semantic only
use_semantic_rename = true
semantic_strict = true
clang_full_parse = false
parser_consensus_mode = "strict" # off | advisory | strict | adaptive
strict_local_scope = true
enforcement = "hard" # must | hard | soft | advisory

[policy.standards.mj]
local_prefix = "_"
member_prefix = "m_"
global_prefix = "g_"
static_prefix = "s_"
const_prefix = "c_"
atomic_prefix = "a_"
pointer_prefix = "p_"
shared_ptr_prefix = "sp_"
unique_ptr_prefix = "up_"
weak_ptr_prefix = "wp_"
function_prefix = "f_"
reference_prefix = "r_"
volatile_prefix = "v_"
enum_var_prefix = "e_"
struct_var_prefix = "t_"
constexpr_prefix_upper = "C_"
static_prefix_upper = "S_"
function_case = "snake"
type_case = "camel"
namespace_case = "camel"
macro_case = "upper_snake"
constexpr_case = "upper_snake"


