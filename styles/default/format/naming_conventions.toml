[policy]
name = "naming_conventions"
enabled = true
type = "python"
touch_contract = "code_only" # any | code_only | preprocessor_only | whitespace_only

# standards: mj (default), google, llvm, qt
standard = "mj"
use_tree_sitter = true
prefer_clang_semantic = true
use_semantic_rename = true
clang_full_parse = false
min_confidence = 0.75
max_risk = "medium"
parser_consensus_mode = "advisory" # off | advisory | strict
parser_consensus_min = 0.70
strict_local_scope = true

control_keywords = ["if", "for", "while", "switch", "catch"]
skip_name_keywords = [
  "if",
  "for",
  "while",
  "switch",
  "catch",
  "return",
  "sizeof",
  "alignof",
  "operator",
]
reserved_identifiers = [
  "this",
  "nullptr",
  "default",
  "delete",
  "new",
  "override",
  "final",
  "std",
  "atomic",
]
builtin_types = [
  "void",
  "bool",
  "char",
  "short",
  "int",
  "long",
  "float",
  "double",
  "signed",
  "unsigned",
  "size_t",
  "ssize_t",
  "auto",
]
