[policy]
name = "clang_format"
enabled = true
type = "python"

# Structural formatter for indentation and nested scope layout.
command = "clang-format"
# Python-like indentation for C++ scopes (4 spaces, nested blocks, nested namespaces).
style = "{BasedOnStyle: LLVM, UseTab: Never, IndentWidth: 4, TabWidth: 4, NamespaceIndentation: All, IndentAccessModifiers: true, AccessModifierOffset: 0, BreakBeforeBraces: Attach, AllowShortIfStatementsOnASingleLine: Never, AllowShortBlocksOnASingleLine: Never, AllowShortFunctionsOnASingleLine: Empty}"
extra_args = []
timeout_seconds = 10.0
