[policy]
name = "clang_format"
enabled = true
type = "python"
touch_contract = "any" # any | code_only | preprocessor_only | whitespace_only

# Structural formatter for indentation and nested scope layout.
command = "clang-format"
# Python-like indentation for C++ scopes (4 spaces, nested blocks, nested namespaces).
style = "{BasedOnStyle: LLVM, ColumnLimit: 100, UseTab: Never, IndentWidth: 4, TabWidth: 4, NamespaceIndentation: All, IndentAccessModifiers: true, AccessModifierOffset: 0, BreakBeforeBraces: Attach, AllowShortIfStatementsOnASingleLine: Never, AllowShortBlocksOnASingleLine: Never, AllowShortFunctionsOnASingleLine: Empty, AllowShortLoopsOnASingleLine: true, PointerAlignment: Left, ReferenceAlignment: Left, AlwaysBreakTemplateDeclarations: Yes, IndentPPDirectives: BeforeHash, ReflowComments: false, AlignConsecutiveAssignments: Consecutive}"
extra_args = []
timeout_seconds = 10.0

[policy.convergence]
domain = "layout.whitespace"
priority = 1000
