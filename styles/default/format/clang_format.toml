[policy]
name = "clang_format"
style = "{BasedOnStyle: LLVM, ColumnLimit: 100, UseTab: Never, IndentWidth: 4, TabWidth: 4, NamespaceIndentation: All, IndentAccessModifiers: true, AccessModifierOffset: 0, BreakBeforeBraces: Attach, AllowShortIfStatementsOnASingleLine: Never, AllowShortBlocksOnASingleLine: Never, AllowShortFunctionsOnASingleLine: Empty, AllowShortLoopsOnASingleLine: true, PointerAlignment: Left, ReferenceAlignment: Left, AlwaysBreakTemplateDeclarations: Yes, IndentPPDirectives: BeforeHash, ReflowComments: false, AlignConsecutiveAssignments: Consecutive, SpaceAfterTemplateKeyword: false, SpaceBeforeParens: Never}"

[policy.convergence]
domain = "layout.whitespace"
priority = 1000
