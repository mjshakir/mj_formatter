[policy]
name = "function_void_params"
enabled = true
type = "python"
touch_contract = "code_only" # any | code_only | preprocessor_only | whitespace_only

# Require (void) for empty parameter lists
require_void = true
# Enforce no space between function name and (
no_space_before_paren = true
prefer_clang = true
use_tree_sitter = true
