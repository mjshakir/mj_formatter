[policy]
name = "dash_comment_normalizer"
enabled = true
type = "lua"
touch_contract = "whitespace_only" # any | code_only | preprocessor_only | whitespace_only
script = "styles/default/lua/dash_comment_normalizer.lua"
function = "apply"
sandbox = true

# modes: threshold | auto
mode = "auto"
long_length = 64
short_length = 28
long_threshold = 50
min_length = 28
